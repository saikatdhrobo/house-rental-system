<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Property Details • Kaliakair Rental
    </title>

    <!-- GOOGLE FONT -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --bg:#0f172a;

            --card:
                rgba(255,255,255,0.08);

            --border:
                rgba(255,255,255,0.12);

            --text:#f8fafc;

            --muted:#cbd5e1;

            --primary:#2563eb;

            --primary-hover:#1d4ed8;

            --success:#22c55e;

            --shadow:
                0 10px 35px rgba(0,0,0,0.35);
        }

        body{

            font-family:'Inter',sans-serif;

            min-height:100vh;

            background:
                radial-gradient(
                    circle at top left,
                    rgba(37,99,235,0.22),
                    transparent 30%
                ),

                radial-gradient(
                    circle at bottom right,
                    rgba(14,165,233,0.18),
                    transparent 30%
                ),

                var(--bg);

            color:var(--text);

            overflow-x:hidden;
        }

        /* BACKGROUND */

        .blur{

            position:fixed;

            border-radius:50%;

            filter:blur(90px);

            z-index:0;
        }

        .blur-1{

            width:320px;
            height:320px;

            background:
                rgba(37,99,235,0.22);

            top:-100px;
            left:-100px;
        }

        .blur-2{

            width:280px;
            height:280px;

            background:
                rgba(14,165,233,0.18);

            bottom:-100px;
            right:-100px;
        }

        /* HEADER */

        .header{

            position:sticky;

            top:0;

            z-index:100;

            backdrop-filter:blur(16px);

            background:
                rgba(15,23,42,0.75);

            border-bottom:
                1px solid rgba(255,255,255,0.08);

            padding:20px 50px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{

            font-size:1.7rem;

            font-weight:800;

            letter-spacing:-1px;
        }

        .logo span{
            color:#38bdf8;
        }

        .nav-links{

            display:flex;
            align-items:center;
            gap:15px;
        }

        .nav-links a{

            text-decoration:none;

            color:#e2e8f0;

            padding:12px 18px;

            border-radius:14px;

            transition:0.25s ease;

            font-weight:600;
        }

        .nav-links a:hover{

            background:
                rgba(255,255,255,0.08);

            color:white;
        }

        .logout-btn{

            background:
                rgba(239,68,68,0.15);

            color:#fca5a5 !important;
        }

        .logout-btn:hover{

            background:
                rgba(239,68,68,0.25);
        }

        /* MAIN */

        .main{

            position:relative;

            z-index:2;

            width:100%;
            max-width:1400px;

            margin:auto;

            padding:50px 25px;
        }

        .property-wrapper{

            display:grid;

            grid-template-columns:1.1fr 0.9fr;

            gap:35px;
        }

        /* IMAGE SECTION */

        .property-gallery{

            background:
                rgba(255,255,255,0.06);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:30px;

            padding:22px;

            backdrop-filter:blur(16px);

            box-shadow:var(--shadow);
        }

        .main-image{

            width:100%;

            height:550px;

            object-fit:cover;

            border-radius:24px;
        }

        .gallery-grid{

            margin-top:18px;

            display:grid;

            grid-template-columns:repeat(3,1fr);

            gap:15px;
        }

        .gallery-grid img{

            width:100%;

            height:120px;

            object-fit:cover;

            border-radius:16px;

            opacity:0.8;

            transition:0.25s ease;
        }

        .gallery-grid img:hover{

            opacity:1;

            transform:translateY(-3px);
        }

        /* PROPERTY INFO */

        .property-info{

            background:
                rgba(255,255,255,0.06);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:30px;

            padding:40px;

            backdrop-filter:blur(16px);

            box-shadow:var(--shadow);

            display:flex;
            flex-direction:column;
        }

        .property-badge{

            width:fit-content;

            padding:10px 18px;

            border-radius:50px;

            background:
                rgba(34,197,94,0.15);

            color:#86efac;

            border:
                1px solid rgba(34,197,94,0.25);

            font-weight:700;

            margin-bottom:22px;
        }

        .property-info h1{

            font-size:3rem;

            letter-spacing:-2px;

            margin-bottom:12px;
        }

        .location{

            display:flex;
            align-items:center;

            gap:10px;

            color:#cbd5e1;

            margin-bottom:28px;
        }

        .price{

            font-size:2.6rem;

            font-weight:800;

            margin-bottom:30px;

            color:#38bdf8;
        }

        .description{

            color:#cbd5e1;

            line-height:1.9;

            margin-bottom:35px;
        }

        /* FEATURES */

        .features-grid{

            display:grid;

            grid-template-columns:repeat(2,1fr);

            gap:18px;

            margin-bottom:35px;
        }

        .feature-card{

            background:
                rgba(255,255,255,0.05);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:20px;

            padding:22px;

            display:flex;
            align-items:center;

            gap:16px;
        }

        .feature-icon{

            width:55px;
            height:55px;

            border-radius:16px;

            background:
                rgba(37,99,235,0.15);

            display:flex;
            justify-content:center;
            align-items:center;

            color:#60a5fa;

            font-size:1.2rem;
        }

        .feature-card h4{

            margin-bottom:5px;
        }

        .feature-card p{

            color:#94a3b8;

            font-size:0.95rem;
        }

        /* PROPERTY HIGHLIGHTS */

        .highlights{

            margin-bottom:35px;
        }

        .highlights h3{

            margin-bottom:18px;
        }

        .highlight-list{

            display:grid;

            gap:15px;
        }

        .highlight{

            display:flex;
            align-items:center;

            gap:12px;

            color:#cbd5e1;
        }

        .highlight i{
            color:#38bdf8;
        }

        /* BUTTONS */

        .button-group{

            display:flex;

            gap:15px;

            flex-wrap:wrap;
        }

        .btn{

            flex:1;

            min-width:180px;

            border:none;

            padding:18px;

            border-radius:18px;

            font-size:1rem;

            font-weight:700;

            cursor:pointer;

            transition:0.25s ease;

            text-decoration:none;

            display:flex;
            justify-content:center;
            align-items:center;

            gap:10px;
        }

        .book-btn{

            background:var(--primary);

            color:white;
        }

        .book-btn:hover{

            background:var(--primary-hover);

            transform:translateY(-2px);

            box-shadow:
                0 12px 30px rgba(37,99,235,0.35);
        }

        .contact-btn{

            background:
                rgba(255,255,255,0.08);

            color:white;

            border:
                1px solid rgba(255,255,255,0.08);
        }

        .contact-btn:hover{

            background:
                rgba(255,255,255,0.12);
        }

        /* MESSAGE */

        .message{

            margin-top:25px;

            padding:16px;

            border-radius:18px;

            font-weight:600;

            display:none;
        }

        .success{

            display:block;

            background:
                rgba(34,197,94,0.15);

            border:
                1px solid rgba(34,197,94,0.25);

            color:#86efac;
        }

        .error{

            display:block;

            background:
                rgba(239,68,68,0.15);

            border:
                1px solid rgba(239,68,68,0.25);

            color:#fca5a5;
        }

        /* FOOTER */

        .footer{

            text-align:center;

            color:#94a3b8;

            padding:30px 20px 40px;
        }

        /* RESPONSIVE */

        @media(max-width:1100px){

            .property-wrapper{
                grid-template-columns:1fr;
            }

        }

        @media(max-width:768px){

            .header{

                padding:20px;

                flex-direction:column;

                gap:18px;
            }

            .nav-links{

                flex-wrap:wrap;
                justify-content:center;
            }

            .property-info,
            .property-gallery{
                padding:22px;
            }

            .property-info h1{
                font-size:2.2rem;
            }

            .main-image{
                height:320px;
            }

            .gallery-grid{
                grid-template-columns:1fr 1fr 1fr;
            }

            .gallery-grid img{
                height:80px;
            }

            .features-grid{
                grid-template-columns:1fr;
            }

            .button-group{
                flex-direction:column;
            }

        }

    </style>

</head>

<body>

    <!-- BACKGROUND -->

    <div class="blur blur-1"></div>

    <div class="blur blur-2"></div>

    <!-- HEADER -->

    <header class="header">

        <div class="logo">
            Kaliakair<span>Rental</span>
        </div>

        <nav class="nav-links">

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="listings.html">
                Listings
            </a>

            <a href="profile.html">
                Profile
            </a>

            <a
                href="#"
                id="logoutBtn"
                class="logout-btn"
            >
                Logout
            </a>

        </nav>

    </header>

    <!-- MAIN -->

    <main class="main">

        <div
            class="property-wrapper"
            id="propertyDetails"
        >

            <!-- DYNAMIC PROPERTY -->

        </div>

    </main>

    <!-- FOOTER -->

    <footer class="footer">

        <p>
            © 2024 Kaliakair Rental Solution.
            All Rights Reserved.
        </p>

    </footer>

    <script>

        // BACKEND URL

        const API_URL =
            "http://127.0.0.1:5000";

        // TOKEN

        const token =
            localStorage.getItem(
                "access_token"
            );

        // LOGIN CHECK

        if(!token){

            alert("Please login first.");

            window.location.href =
                "login.html";
        }

        // PROPERTY DATA

        const properties = [

            {
                id:1,

                name:"Saikat Apartment",

                image:"images/saikat-apartment.jpg",

                bedrooms:2,

                bathrooms:1,

                size:"800 sq.ft.",

                location:"Kaliakair, Gazipur",

                price:4000,

                description:
                    "A modern apartment designed for small families and professionals with excellent accessibility, peaceful surroundings, and premium comfort.",

                gallery:[
                    "images/saikat-apartment.jpg",
                    "images/saikat-apartment.jpg",
                    "images/saikat-apartment.jpg"
                ]
            },

            {
                id:2,

                name:"Fahim Villa",

                image:"images/fahim-villa.webp",

                bedrooms:4,

                bathrooms:3,

                size:"1800 sq.ft.",

                location:"Kaliakair, Gazipur",

                price:9000,

                description:
                    "Luxury villa with spacious interiors, modern architecture, elegant lighting, and premium facilities perfect for large families.",

                gallery:[
                    "images/fahim-villa.webp",
                    "images/fahim-villa.webp",
                    "images/fahim-villa.webp"
                ]
            },

            {
                id:3,

                name:"Kowsar Studio",

                image:"images/kowsar-studio.jpg",

                bedrooms:1,

                bathrooms:1,

                size:"500 sq.ft.",

                location:"Dhaka City Center",

                price:15000,

                description:
                    "A stylish city studio apartment offering modern urban living with easy transportation access and a premium environment.",

                gallery:[
                    "images/kowsar-studio.jpg",
                    "images/kowsar-studio.jpg",
                    "images/kowsar-studio.jpg"
                ]
            },

            {
                id:4,

                name:"AL Amin Apartment",

                image:"images/al-amin-apartment.webp",

                bedrooms:3,

                bathrooms:2,

                size:"1200 sq.ft.",

                location:"Kaliakair Residential Area",

                price:6000,

                description:
                    "Spacious apartment with a modern family-friendly environment, beautiful interior layout, and excellent nearby facilities.",

                gallery:[
                    "images/al-amin-apartment.webp",
                    "images/al-amin-apartment.webp",
                    "images/al-amin-apartment.webp"
                ]
            }

        ];

        // LOAD PROPERTY DETAILS

        function getPropertyDetails(){

            const urlParams =
                new URLSearchParams(
                    window.location.search
                );

            const propertyId =
                parseInt(
                    urlParams.get("id")
                );

            const property =
                properties.find(
                    p => p.id === propertyId
                );

            const container =
                document.getElementById(
                    "propertyDetails"
                );

            if(!property){

                container.innerHTML = `

                    <div
                        style="
                            text-align:center;
                            width:100%;
                            padding:80px;
                            background:rgba(255,255,255,0.05);
                            border-radius:30px;
                        "
                    >

                        <h1>
                            Property Not Found
                        </h1>

                    </div>

                `;

                return;
            }

            // GALLERY

            const galleryImages =
                property.gallery
                .map(img => `
                    <img
                        src="${img}"
                        alt="${property.name}"
                    >
                `)
                .join("");

            // RENDER

            container.innerHTML = `

                <!-- LEFT -->

                <div class="property-gallery">

                    <img
                        src="${property.image}"
                        alt="${property.name}"
                        class="main-image"
                    >

                    <div class="gallery-grid">

                        ${galleryImages}

                    </div>

                </div>

                <!-- RIGHT -->

                <div class="property-info">

                    <div class="property-badge">
                        Available For Rent
                    </div>

                    <h1>
                        ${property.name}
                    </h1>

                    <div class="location">

                        <i class="fa-solid fa-location-dot"></i>

                        <span>
                            ${property.location}
                        </span>

                    </div>

                    <div class="price">
                        ৳${property.price}/month
                    </div>

                    <p class="description">
                        ${property.description}
                    </p>

                    <!-- FEATURES -->

                    <div class="features-grid">

                        <div class="feature-card">

                            <div class="feature-icon">
                                <i class="fa-solid fa-bed"></i>
                            </div>

                            <div>

                                <h4>
                                    Bedrooms
                                </h4>

                                <p>
                                    ${property.bedrooms} Rooms
                                </p>

                            </div>

                        </div>

                        <div class="feature-card">

                            <div class="feature-icon">
                                <i class="fa-solid fa-bath"></i>
                            </div>

                            <div>

                                <h4>
                                    Bathrooms
                                </h4>

                                <p>
                                    ${property.bathrooms} Bathrooms
                                </p>

                            </div>

                        </div>

                        <div class="feature-card">

                            <div class="feature-icon">
                                <i class="fa-solid fa-ruler-combined"></i>
                            </div>

                            <div>

                                <h4>
                                    Property Size
                                </h4>

                                <p>
                                    ${property.size}
                                </p>

                            </div>

                        </div>

                        <div class="feature-card">

                            <div class="feature-icon">
                                <i class="fa-solid fa-wifi"></i>
                            </div>

                            <div>

                                <h4>
                                    Internet
                                </h4>

                                <p>
                                    High Speed WiFi
                                </p>

                            </div>

                        </div>

                    </div>

                    <!-- HIGHLIGHTS -->

                    <div class="highlights">

                        <h3>
                            Property Highlights
                        </h3>

                        <div class="highlight-list">

                            <div class="highlight">

                                <i class="fa-solid fa-check"></i>

                                <span>
                                    24/7 Security Service
                                </span>

                            </div>

                            <div class="highlight">

                                <i class="fa-solid fa-check"></i>

                                <span>
                                    Modern Interior Design
                                </span>

                            </div>

                            <div class="highlight">

                                <i class="fa-solid fa-check"></i>

                                <span>
                                    Nearby Shopping Facilities
                                </span>

                            </div>

                            <div class="highlight">

                                <i class="fa-solid fa-check"></i>

                                <span>
                                    Family Friendly Environment
                                </span>

                            </div>

                        </div>

                    </div>

                    <!-- BUTTONS -->

                    <div class="button-group">

                        <button
                            class="btn book-btn"
                            onclick="bookProperty('${property.name}')"
                        >

                            <i class="fa-solid fa-calendar-check"></i>

                            Book Now

                        </button>

                        <a
                            href="contact.html"
                            class="btn contact-btn"
                        >

                            <i class="fa-solid fa-phone"></i>

                            Contact Owner

                        </a>

                    </div>

                    <!-- MESSAGE -->

                    <div
                        id="message"
                        class="message"
                    ></div>

                </div>

            `;
        }

        // BOOK PROPERTY

        async function bookProperty(propertyName){

            const messageBox =
                document.getElementById(
                    "message"
                );

            try{

                const response =
                    await fetch(
                        `${API_URL}/todos/todo`,
                        {

                            method:"POST",

                            headers:{
                                "Content-Type":
                                    "application/json",

                                "Authorization":
                                    `Bearer ${token}`
                            },

                            body:JSON.stringify({

                                title:propertyName,

                                description:
                                    `Booking request for ${propertyName}`,

                                priority:3,

                                complete:false

                            })

                        }
                    );

                const data =
                    await response.json();

                if(response.ok){

                    messageBox.innerText =
                        `${propertyName} booked successfully!`;

                    messageBox.className =
                        "message success";

                }else{

                    messageBox.innerText =
                        data.detail ||
                        "Booking failed.";

                    messageBox.className =
                        "message error";
                }

            }catch(error){

                console.error(error);

                messageBox.innerText =
                    "Cannot connect to Flask backend.";

                messageBox.className =
                    "message error";
            }

        }

        // LOGOUT

        document
            .getElementById("logoutBtn")

            .addEventListener(
                "click",

                function(){

                    localStorage.removeItem(
                        "access_token"
                    );

                    window.location.href =
                        "login.html";
                }
            );

        // LOAD PAGE

        getPropertyDetails();

    </script>

</body>
</html>
