<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Register • Kaliakair Rental
    </title>

    <!-- GOOGLE FONT -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --bg:#0f172a;

            --card:
                rgba(255,255,255,0.08);

            --border:
                rgba(255,255,255,0.12);

            --text:#f8fafc;

            --muted:#cbd5e1;

            --primary:#2563eb;

            --primary-hover:#1d4ed8;

            --accent:#38bdf8;

            --danger:#ef4444;

            --success:#22c55e;

            --shadow:
                0 12px 40px rgba(0,0,0,0.35);
        }

        body{

            font-family:'Inter',sans-serif;

            min-height:100vh;

            background:
                radial-gradient(
                    circle at top left,
                    rgba(37,99,235,0.22),
                    transparent 30%
                ),

                radial-gradient(
                    circle at bottom right,
                    rgba(14,165,233,0.16),
                    transparent 30%
                ),

                var(--bg);

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            position:relative;

            padding:25px;
        }

        /* BACKGROUND BLUR */

        .blur{

            position:absolute;

            border-radius:50%;

            filter:blur(90px);

            z-index:0;
        }

        .blur-1{

            width:320px;
            height:320px;

            background:
                rgba(37,99,235,0.25);

            top:-120px;
            left:-100px;
        }

        .blur-2{

            width:280px;
            height:280px;

            background:
                rgba(14,165,233,0.18);

            bottom:-120px;
            right:-100px;
        }

        /* MAIN CONTAINER */

        .register-wrapper{

            position:relative;

            z-index:5;

            width:100%;
            max-width:520px;

            background:
                rgba(255,255,255,0.08);

            border:
                1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border-radius:32px;

            padding:45px;

            box-shadow:var(--shadow);
        }

        /* LOGO */

        .logo{

            text-align:center;

            font-size:2rem;

            font-weight:800;

            color:white;

            margin-bottom:10px;

            letter-spacing:-1px;
        }

        .logo span{
            color:var(--accent);
        }

        .subtitle{

            text-align:center;

            color:var(--muted);

            margin-bottom:35px;

            line-height:1.7;
        }

        /* FORM */

        .form-group{

            margin-bottom:18px;
        }

        .form-group label{

            display:block;

            color:#e2e8f0;

            margin-bottom:10px;

            font-size:0.95rem;

            font-weight:600;
        }

        .input-box{

            position:relative;
        }

        .input-box i{

            position:absolute;

            left:16px;
            top:50%;

            transform:translateY(-50%);

            color:#94a3b8;
        }

        .input-box input{

            width:100%;

            padding:16px 18px 16px 50px;

            border-radius:18px;

            border:
                1px solid rgba(255,255,255,0.08);

            background:
                rgba(255,255,255,0.06);

            color:white;

            font-size:1rem;

            transition:0.25s ease;
        }

        .input-box input::placeholder{
            color:#94a3b8;
        }

        .input-box input:focus{

            outline:none;

            border:
                1px solid rgba(56,189,248,0.5);

            box-shadow:
                0 0 0 4px rgba(56,189,248,0.12);
        }

        /* PASSWORD STRENGTH */

        .strength-wrapper{

            margin-top:12px;
        }

        .strength-bar{

            width:100%;

            height:8px;

            border-radius:20px;

            background:
                rgba(255,255,255,0.08);

            overflow:hidden;
        }

        .strength-fill{

            height:100%;

            width:0%;

            border-radius:20px;

            transition:0.3s ease;
        }

        .strength-text{

            margin-top:8px;

            font-size:0.9rem;

            color:#cbd5e1;
        }

        /* BUTTON */

        .register-btn{

            width:100%;

            margin-top:25px;

            border:none;

            padding:18px;

            border-radius:20px;

            background:var(--primary);

            color:white;

            font-size:1rem;

            font-weight:700;

            cursor:pointer;

            transition:0.25s ease;
        }

        .register-btn:hover{

            background:var(--primary-hover);

            transform:translateY(-2px);

            box-shadow:
                0 12px 30px rgba(37,99,235,0.35);
        }

        /* TERMS */

        .terms{

            margin-top:18px;

            display:flex;
            align-items:flex-start;

            gap:10px;

            color:#cbd5e1;

            font-size:0.9rem;

            line-height:1.5;
        }

        .terms input{
            margin-top:4px;
        }

        /* LOGIN LINK */

        .login-link{

            margin-top:28px;

            text-align:center;

            color:#cbd5e1;
        }

        .login-link a{

            color:#38bdf8;

            text-decoration:none;

            font-weight:700;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

        /* MESSAGE */

        .message{

            margin-top:22px;

            padding:16px;

            border-radius:18px;

            font-weight:600;

            display:none;

            line-height:1.5;
        }

        .success{

            display:block;

            background:
                rgba(34,197,94,0.15);

            border:
                1px solid rgba(34,197,94,0.25);

            color:#86efac;
        }

        .error{

            display:block;

            background:
                rgba(239,68,68,0.15);

            border:
                1px solid rgba(239,68,68,0.25);

            color:#fca5a5;
        }

        /* RESPONSIVE */

        @media(max-width:600px){

            .register-wrapper{
                padding:30px 22px;
            }

            .logo{
                font-size:1.7rem;
            }

        }

    </style>

</head>

<body>

    <!-- BACKGROUND -->

    <div class="blur blur-1"></div>

    <div class="blur blur-2"></div>

    <!-- REGISTER CARD -->

    <div class="register-wrapper">

        <div class="logo">
            Kaliakair<span>Rental</span>
        </div>

        <p class="subtitle">

            Create your account and explore
            premium rental properties with
            a modern experience.

        </p>

        <!-- FORM -->

        <form id="registerForm">

            <!-- FULL NAME -->

            <div class="form-group">

                <label>
                    Full Name
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="fullName"
                        placeholder="Enter your full name"
                        required
                    >

                </div>

            </div>

            <!-- USERNAME -->

            <div class="form-group">

                <label>
                    Username
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-at"></i>

                    <input
                        type="text"
                        id="username"
                        placeholder="Choose a username"
                        required
                    >

                </div>

            </div>

            <!-- EMAIL -->

            <div class="form-group">

                <label>
                    Email Address
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <label>
                    Password
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Create a strong password"
                        required
                    >

                </div>

                <!-- PASSWORD STRENGTH -->

                <div class="strength-wrapper">

                    <div class="strength-bar">

                        <div
                            class="strength-fill"
                            id="strengthFill"
                        ></div>

                    </div>

                    <div
                        class="strength-text"
                        id="strengthText"
                    >
                        Password strength
                    </div>

                </div>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="form-group">

                <label>
                    Confirm Password
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-shield-halved"></i>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm your password"
                        required
                    >

                </div>

            </div>

            <!-- TERMS -->

            <div class="terms">

                <input
                    type="checkbox"
                    id="terms"
                    required
                >

                <label for="terms">

                    I agree to the terms &
                    conditions and privacy policy.

                </label>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="register-btn"
            >

                <i class="fa-solid fa-user-plus"></i>

                Create Account

            </button>

        </form>

        <!-- MESSAGE -->

        <div
            id="message"
            class="message"
        ></div>

        <!-- LOGIN LINK -->

        <div class="login-link">

            Already have an account?

            <a href="login.html">
                Login here
            </a>

        </div>

    </div>

    <script>

        // API URL

        const API_URL =
            "http://127.0.0.1:5000";

        // AUTO REDIRECT

        const existingToken =
            localStorage.getItem(
                "access_token"
            );

        if(existingToken){

            window.location.href =
                "dashboard.html";
        }

        // PASSWORD STRENGTH

        const passwordInput =
            document.getElementById(
                "password"
            );

        const strengthFill =
            document.getElementById(
                "strengthFill"
            );

        const strengthText =
            document.getElementById(
                "strengthText"
            );

        passwordInput.addEventListener(
            "input",

            function(){

                const value =
                    passwordInput.value;

                let strength = 0;

                if(value.length >= 6)
                    strength++;

                if(/[A-Z]/.test(value))
                    strength++;

                if(/[0-9]/.test(value))
                    strength++;

                if(/[^A-Za-z0-9]/.test(value))
                    strength++;

                if(strength === 0){

                    strengthFill.style.width =
                        "0%";

                    strengthText.innerText =
                        "Password strength";

                }

                else if(strength === 1){

                    strengthFill.style.width =
                        "25%";

                    strengthFill.style.background =
                        "#ef4444";

                    strengthText.innerText =
                        "Weak password";

                }

                else if(strength === 2){

                    strengthFill.style.width =
                        "50%";

                    strengthFill.style.background =
                        "#f59e0b";

                    strengthText.innerText =
                        "Medium password";

                }

                else if(strength === 3){

                    strengthFill.style.width =
                        "75%";

                    strengthFill.style.background =
                        "#38bdf8";

                    strengthText.innerText =
                        "Strong password";

                }

                else{

                    strengthFill.style.width =
                        "100%";

                    strengthFill.style.background =
                        "#22c55e";

                    strengthText.innerText =
                        "Very strong password";
                }

            }
        );

        // REGISTER FORM

        document
            .getElementById(
                "registerForm"
            )

            .addEventListener(
                "submit",

                async function(e){

                    e.preventDefault();

                    const fullName =
                        document.getElementById(
                            "fullName"
                        ).value.trim();

                    const username =
                        document.getElementById(
                            "username"
                        ).value.trim();

                    const email =
                        document.getElementById(
                            "email"
                        ).value.trim();

                    const password =
                        document.getElementById(
                            "password"
                        ).value.trim();

                    const confirmPassword =
                        document.getElementById(
                            "confirmPassword"
                        ).value.trim();

                    const messageBox =
                        document.getElementById(
                            "message"
                        );

                    // VALIDATION

                    if(
                        !fullName ||
                        !username ||
                        !email ||
                        !password ||
                        !confirmPassword
                    ){

                        messageBox.innerText =
                            "Please fill all fields.";

                        messageBox.className =
                            "message error";

                        return;
                    }

                    if(password.length < 6){

                        messageBox.innerText =
                            "Password must be at least 6 characters.";

                        messageBox.className =
                            "message error";

                        return;
                    }

                    if(password !== confirmPassword){

                        messageBox.innerText =
                            "Passwords do not match.";

                        messageBox.className =
                            "message error";

                        return;
                    }

                    // NAME SPLIT

                    const nameParts =
                        fullName.split(" ");

                    const firstName =
                        nameParts[0] || "";

                    const lastName =
                        nameParts
                        .slice(1)
                        .join(" ") || "";

                    try{

                        const response =
                            await fetch(
                                `${API_URL}/auth`,
                                {

                                    method:"POST",

                                    headers:{
                                        "Content-Type":
                                            "application/json"
                                    },

                                    body:JSON.stringify({

                                        username:username,

                                        email:email,

                                        first_name:firstName,

                                        last_name:lastName,

                                        password:password,

                                        role:"user"

                                    })

                                }
                            );

                        const data =
                            await response.json();

                        if(response.ok){

                            messageBox.innerText =
                                "Registration successful! Redirecting to login...";

                            messageBox.className =
                                "message success";

                            document
                                .getElementById(
                                    "registerForm"
                                )
                                .reset();

                            setTimeout(
                                () => {

                                    window.location.href =
                                        "login.html";

                                },

                                1500
                            );

                        }else{

                            messageBox.innerText =
                                data.detail ||
                                data.error ||
                                "Registration failed.";

                            messageBox.className =
                                "message error";
                        }

                    }catch(error){

                        console.error(error);

                        messageBox.innerText =
                            "Cannot connect to Flask backend.";

                        messageBox.className =
                            "message error";
                    }

                }
            );

    </script>

</body>
</html>
